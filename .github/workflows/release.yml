name: Release

# Baut die Distributables auf einem Tag-Push (vX.Y.Z) und haengt sie an das
# zugehoerige GitHub-Release. Die Version kommt aus dem Tag bzw. package.json
# (Single Source of Truth) — die Pipeline baut nur, sie taggt nicht.
#
# Artefakte bleiben UNSIGNIERT (kein Apple Developer-ID / kein Windows-Cert):
# macOS zeigt Gatekeeper, Windows ggf. SmartScreen. Das ist Stufe 1 by design.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-14 # Apple Silicon -> passt zu --arch arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # 'npm run make' scheitert gelegentlich beim DMG-Schritt an einem flaky
      # 'hdiutil detach' (appdmg-Race: Volume ist beim Unmount schon weg ->
      # "No such file or directory"). Kein Config-Bug (identische Config baute
      # fruehere Releases erfolgreich), daher hier gegen die Flakiness haerten:
      # bis zu 3 Versuche, dazwischen Alt-Volumes zwangsweise loesen und
      # partielle Outputs entfernen.
      - name: Build distributables (retry flaky hdiutil detach)
        shell: bash
        run: |
          set -uo pipefail
          attempts=3
          for i in $(seq 1 "$attempts"); do
            echo "::group::npm run make (Versuch $i/$attempts)"
            if npm run make; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "make-Versuch $i fehlgeschlagen; raeume vor Retry auf"
            for vol in "/Volumes/Weyouze Anything"*; do
              [ -d "$vol" ] && hdiutil detach "$vol" -force || true
            done
            rm -rf out/make || true
          done
          echo "npm run make nach $attempts Versuchen fehlgeschlagen" >&2
          exit 1
      - name: Collect DMG
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          dmg="$(ls out/make/*.dmg | head -1)"
          cp "$dmg" "dist/Weyouze-Anything-${version}-mac-arm64.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*

  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run package:win
      - name: Zip package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "$env:GITHUB_REF_NAME".TrimStart('v')
          $dir = (Get-ChildItem -Path out -Directory -Filter '*-win32-x64' | Select-Object -First 1).FullName
          if (-not $dir) { throw 'Kein *-win32-x64 Package-Verzeichnis gefunden.' }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "$dir/*" -DestinationPath "dist/Weyouze-Anything-$version-win-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*

  release:
    name: Publish release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
