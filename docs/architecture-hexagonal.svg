  <rect class="ext" x="1515" y="494" width="185" height="60" rx="9"/>
  <text class="chip tt-ext" x="1607" y="520">Dateisystem</text><text class="chipsub" x="1607" y="538">Workspace-Ordner (fs-service)</text>
  <rect class="ext" x="1515" y="566" width="185" height="60" rx="9"/>
