  <rect x="1515" y="638" width="185" height="126" rx="9" fill="#f3f6fa" stroke="#8a97a6" stroke-width="1.1" stroke-dasharray="4 3"/>
  <text class="bsub" x="1527" y="660" font-weight="700" fill="#47535f">Ohne externes System</text>
  <text class="note" x="1527" y="680">workspace-path-adapter und</text>
  <text class="note" x="1527" y="696">raw-exchange-adapter bleiben</text>
