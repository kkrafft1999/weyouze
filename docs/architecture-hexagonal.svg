  <line class="flow" x1="320" y1="430" x2="344" y2="565" marker-end="url(#ah)"/>

  <!-- ============ HEXAGON CORE ============ -->
  <polygon class="hex" points="650,300 910,450 910,760 650,910 390,760 390,450"/>
  <text x="650" y="462" text-anchor="middle" class="zlabel tt-core">ANWENDUNGS-KERN · src/application/chat</text>
  <text x="650" y="490" text-anchor="middle" font-size="17" font-weight="700" class="tt-core">Chat-Orchestrierung &amp; Tool-Loop</text>
  <text class="note" x="452" y="520" fill="#204b3d">• chat-engine.js — Runden-/Tool-Schleife, System-Prompt</text>
  <text class="note" x="452" y="540" fill="#204b3d">• chat-history-trim.js — Kontextfenster (Trim)</text>
  <text class="note" x="452" y="560" fill="#204b3d">• Usage-Aggregation, RAW-Protokoll, Abbruch-Handling</text>
  <text class="note" x="452" y="580" fill="#204b3d">• provider-/tool-/electron-/node-frei</text>
  <rect x="446" y="598" width="408" height="132" rx="8" fill="#f4fbf8" stroke="#0e7a5b" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="458" y="620" font-size="11" font-weight="700" fill="#0b5b44">Regel der Hexagonal-Architektur</text>
  <text x="458" y="639" font-size="10.5" fill="#356b58">Der Kern kennt keine Adapter — er spricht mit der</text>
  <text x="458" y="655" font-size="10.5" fill="#356b58">Außenwelt ausschließlich über Anwendungs-Ports</text>
  <text x="458" y="671" font-size="10.5" fill="#356b58">(src/application/ports) und hängt sonst nur von</text>
  <text x="458" y="687" font-size="10.5" fill="#356b58">src/shared/contracts und src/shared/runtime ab.</text>
  <text x="458" y="710" font-size="10.5" font-style="italic" fill="#0b5b44">Erzwungen durch test/application-layer-imports.test.js:</text>
  <text x="458" y="725" font-size="10.5" font-style="italic" fill="#0b5b44">keine Imports außerhalb von application/ und shared/.</text>

  <!-- ============ PORTS (on hexagon boundary) ============ -->
  <rect class="port" x="342" y="548" width="96" height="34" rx="6"/>
  <text class="portlbl" x="390" y="564">Chat-Engine-API</text>
  <text class="portsub" x="390" y="576">send · explain · abort</text>

  <rect class="port" x="866" y="420" width="88" height="30" rx="6"/><text class="portlbl" x="910" y="439">LlmPort</text>
  <rect class="port" x="866" y="492" width="88" height="30" rx="6"/><text class="portlbl" x="910" y="511">ToolPort</text>
  <rect class="port" x="866" y="564" width="88" height="30" rx="6"/><text class="portlbl" x="910" y="583">Prefs-Port</text>
  <rect class="port" x="866" y="636" width="88" height="30" rx="6"/><text class="portlbl" x="910" y="655">Pfad-Port</text>
  <rect class="port" x="866" y="708" width="88" height="30" rx="6"/><text class="portlbl" x="910" y="727">Raw-Port</text>

  <!-- ============ PRIMARY (DRIVING) SIDE ============ -->
  <rect class="ui" x="40" y="252" width="280" height="62" rx="10"/>
  <text class="btitle tt-ui" x="180" y="280" text-anchor="middle">Renderer-UI</text>
  <text class="chipsub" x="180" y="298">Reine Präsentation · treibt den Use Case</text>

  <rect x="40" y="322" width="280" height="72" rx="10" fill="#f8fbff" stroke="#2f6db3" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="bsub" x="52" y="342" font-weight="700" fill="#1c4b82">Normalisierte View-Daten (Stage 5)</text>
  <text class="note" x="52" y="360">Settings · Tool-Zeilen · RAW-Log · Verlauf</text>
  <text class="note" x="52" y="376">DOM/Markdown/Zeit/a11y bleiben im Renderer</text>
  <text class="note" x="52" y="390">kein Provider-Wire · keine Tool-Namen-Logik</text>

  <rect class="preload" x="40" y="402" width="280" height="30" rx="8"/>
  <text x="180" y="421" text-anchor="middle" font-size="11" font-weight="600" fill="#1e2b3d">Preload-Bridge · IPC (window.electronAPI)</text>

  <rect class="hand" x="40" y="448" width="280" height="88" rx="10" fill="#eef7f1"/>
  <text class="btitle tt-hand" x="52" y="470">IPC-Handler „chat" — dünner treibender Adapter</text>
  <text class="bsub" x="52" y="488">src/main/ipc/chat-handlers.js</text>
  <text class="note" x="52" y="508">übersetzt IPC (chat:send / :explain / :abort)</text>
  <text class="note" x="52" y="524">in Aufrufe der Chat-Engine-API des Kerns.</text>

  <rect x="40" y="552" width="280" height="96" rx="10" fill="#f3f6fa" stroke="#8a97a6" stroke-width="1.1" stroke-dasharray="4 3"/>
  <text class="bsub" x="52" y="572" font-weight="700" fill="#47535f">Weitere IPC-Handler (kein Chat-Core)</text>
  <text class="note" x="52" y="590">fs · dialog · settings · whisper ·</text>
  <text class="note" x="52" y="606">update · chat-history</text>
  <text class="note" x="52" y="628">delegieren an injizierte Infra-Ports/Services —</text>
  <text class="note" x="52" y="642">Präsentation via settings-/raw-log-service.</text>

  <line class="flow" x1="180" y1="314" x2="180" y2="321" marker-end="url(#ah)"/>
  <line class="flow" x1="180" y1="394" x2="180" y2="401" marker-end="url(#ah)"/>
  <line class="flow" x1="180" y1="432" x2="180" y2="447" marker-end="url(#ah)"/>

  <!-- ============ CORE PORT ADAPTERS ============ -->
  <rect class="prov" x="985" y="420" width="215" height="64" rx="9"/>
  <text class="btitle tt-prov" x="997" y="443">provider-llm-adapter</text>
  <text class="bsub" x="997" y="460">LlmPort → provider-runtime + secrets</text>
  <text class="bsub" x="997" y="476">openai · anthropic · google · ollama · mlx-lm</text>

  <rect class="tool" x="985" y="492" width="215" height="64" rx="9"/>
  <text class="btitle tt-tool" x="997" y="515">workspace-tool-adapter</text>
  <text class="bsub" x="997" y="532">ToolPort → tool-registry + tool-display</text>
  <text class="bsub" x="997" y="548">list/read/write/debug · via fs-service</text>

  <rect class="svc" x="985" y="564" width="215" height="64" rx="9"/>
  <text class="btitle tt-svc" x="997" y="587">chat-preferences-adapter</text>
  <text class="bsub" x="997" y="604">Prefs-Port → ui-prefs-store</text>
  <text class="bsub" x="997" y="620">System-Prompt · Write · Limits</text>

  <rect class="svc" x="985" y="636" width="215" height="56" rx="9"/>
  <text class="btitle tt-svc" x="997" y="659">workspace-path-adapter</text>
  <text class="bsub" x="997" y="676">Pfad-Port → Node path (prozessintern)</text>

  <rect class="svc" x="985" y="708" width="215" height="56" rx="9"/>
  <text class="btitle tt-svc" x="997" y="731">raw-exchange-adapter</text>
  <text class="bsub" x="997" y="748">Raw-Port → llm-raw-log (prozessintern)</text>

  <!-- adapter -> external (core adapters with externals) -->
  <line class="flow" x1="1200" y1="452" x2="1513" y2="452" marker-end="url(#ah)"/>
  <line class="flow" x1="1200" y1="524" x2="1513" y2="524" marker-end="url(#ah)"/>
  <line class="flow" x1="1200" y1="596" x2="1513" y2="596" marker-end="url(#ah)"/>

  <!-- ============ INFRASTRUCTURE PORTS PANEL ============ -->
  <rect x="985" y="788" width="445" height="148" rx="10" fill="#f5f7fc" stroke="#5566b5" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text class="zlabel tt-svc" x="997" y="812">INFRASTRUKTUR-GRENZE · src/main/ports + Adapter</text>
  <text class="bsub" x="997" y="830">Schmale Oberflächen — von create-application.js injiziert, nicht vom Core importiert</text>
  <g>
    <rect class="iport" x="997" y="842" width="100" height="26" rx="5"/><text class="iportlbl" x="1047" y="859">runtime</text>
    <rect class="iport" x="1105" y="842" width="100" height="26" rx="5"/><text class="iportlbl" x="1155" y="859">catalog</text>
    <rect class="iport" x="1213" y="842" width="100" height="26" rx="5"/><text class="iportlbl" x="1263" y="859">secrets</text>
    <rect class="iport" x="1321" y="842" width="100" height="26" rx="5"/><text class="iportlbl" x="1371" y="859">listing</text>
  </g>
  <g>
    <rect class="iport" x="997" y="876" width="100" height="26" rx="5"/><text class="iportlbl" x="1047" y="893">credential</text>
    <rect class="iport" x="1105" y="876" width="100" height="26" rx="5"/><text class="iportlbl" x="1155" y="893">filesystem</text>
    <rect class="iport" x="1213" y="876" width="100" height="26" rx="5"/><text class="iportlbl" x="1263" y="893">speech</text>
