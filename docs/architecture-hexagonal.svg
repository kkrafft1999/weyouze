  <rect class="ext" x="1515" y="876" width="185" height="60" rx="9"/>
  <text class="chip tt-ext" x="1607" y="902">GitHub Releases</text><text class="chipsub" x="1607" y="920">Update-Check</text>

  <line class="flow-d" x1="1430" y1="838" x2="1513" y2="838" marker-end="url(#ah)"/>
  <line class="flow-d" x1="1430" y1="906" x2="1513" y2="906" marker-end="url(#ah)"/>

  <!-- ============ COMPOSITION ROOT NOTE ============ -->
  <rect x="40" y="960" width="440" height="88" rx="10" fill="#fff7e6" stroke="#c68a2e" stroke-width="1.2"/>
  <text x="260" y="984" text-anchor="middle" font-size="12" font-weight="700" fill="#8a5a12">Composition-Root</text>
  <text x="260" y="1003" text-anchor="middle" font-size="10.5" fill="#8a5a12">src/main/composition/create-application.js</text>
  <text x="260" y="1019" text-anchor="middle" font-size="10.5" fill="#8a5a12">verdrahtet Infrastruktur-Ports, Services, IPC-Handler</text>
  <text x="260" y="1035" text-anchor="middle" font-size="10.5" fill="#8a5a12">und ruft create-chat-application.js für den Kern auf.</text>

  <rect x="500" y="960" width="440" height="88" rx="10" fill="#fff7e6" stroke="#c68a2e" stroke-width="1.2"/>
  <text x="720" y="984" text-anchor="middle" font-size="12" font-weight="700" fill="#8a5a12">Chat-Core-Assembly · Bootstrap</text>
  <text x="720" y="1003" text-anchor="middle" font-size="10.5" fill="#8a5a12">create-chat-application.js → createChatEngine()</text>
  <text x="720" y="1019" text-anchor="middle" font-size="10.5" fill="#8a5a12">src/main/index.js — Electron-Lifecycle, ruft nur</text>
  <text x="720" y="1035" text-anchor="middle" font-size="10.5" fill="#8a5a12">createApplication() auf (keine Handler-Verdrahtung).</text>

  <rect x="960" y="960" width="740" height="88" rx="10" fill="#fdf6e3" stroke="#c68a2e" stroke-width="1.2"/>
  <text x="1330" y="984" text-anchor="middle" font-size="12" font-weight="700" fill="#8a5a12">Shared-Schichten (≠ Ports)</text>
  <text x="1330" y="1003" text-anchor="middle" font-size="10.5" fill="#8a5a12">contracts/ — DTOs &amp; Events · presentation/ — tool-display</text>
  <text x="1330" y="1019" text-anchor="middle" font-size="10.5" fill="#8a5a12">runtime/ — abort · fetch-errors · daneben ipc-channels.js · limits.js</text>
  <text x="1330" y="1035" text-anchor="middle" font-size="10.5" fill="#8a5a12">Main-Präsentation: settings-/raw-log-service, chat-history-normalization</text>

  <!-- ============ BOTTOM NOTE + STAMP ============ -->
  <text x="870" y="1100" text-anchor="middle" font-size="11.5" font-weight="600" fill="#8a5a12">Anwendungs-Ports (src/application/ports) · Infrastruktur-Ports (src/main/ports) · Contracts (src/shared/contracts) — drei getrennte Vertragsarten. Der Kern kennt nur Anwendungs-Ports sowie shared/contracts und shared/runtime.</text>
  <text x="30" y="1256" font-size="11" fill="#8a97a6">docs/architecture-hexagonal.svg</text>
  <text x="1710" y="1256" text-anchor="end" font-size="11" fill="#8a97a6">Aktualisiert 2026-07-12 · Roadmap-Etappen 1–5 abgeschlossen</text>
</svg>
