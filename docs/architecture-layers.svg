  <rect class="zone-main" x="30" y="415" width="1090" height="470" rx="14"/>
  <text class="zlabel tt-hand" x="50" y="441">MAIN-PROZESS — FUNKTIONALE MODULE (frontend-unabhängig)</text>

  <line class="flow" x1="380" y1="386" x2="380" y2="459" marker-end="url(#ah)" marker-start="url(#ah)"/>
  <line class="flow" x1="860" y1="386" x2="860" y2="459" marker-end="url(#ah)" marker-start="url(#ah)"/>
  <text class="arrlbl" x="620" y="428">IPC-Kanäle · DTOs / Events</text>

