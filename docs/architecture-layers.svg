<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 1050" width="1360" height="1050" role="img" aria-labelledby="title desc" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="title">Weyouze Anything — Architektur: UI-Schicht vs. funktionale Module</title>
  <desc id="desc">Geschichtetes Architekturdiagramm: reine UI (Renderer) getrennt von den funktionalen Modulen (Main-Prozess), verbunden nur über die Preload-Bridge und die Shared Contracts.</desc>
  <defs>
    <marker id="ah" viewBox="0 0 8 6" markerWidth="9" markerHeight="7" refX="7" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5a6a78"/>
    </marker>
    <marker id="ahc" viewBox="0 0 8 6" markerWidth="9" markerHeight="7" refX="7" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c68a2e"/>
    </marker>
    <style>
      text{fill:#1b2733}
      .t-title{font-size:26px;font-weight:700}
      .t-sub{font-size:13px;fill:#5b6b7a}
      .zlabel{font-size:14px;font-weight:700;letter-spacing:1px}
      .btitle{font-size:13.5px;font-weight:700}
      .bsub{font-size:10.5px;fill:#5b6b7a}
      .chip{font-size:12px;font-weight:600;text-anchor:middle}
      .chipsub{font-size:9.5px;fill:#5b6b7a;text-anchor:middle}
      .note{font-size:11px;fill:#5b6b7a}
      .arrlbl{font-size:10px;fill:#47535f;font-weight:600;text-anchor:middle}
      .legend{font-size:12px;fill:#33414f}
      .tt-ui{fill:#1c4b82}.tt-hand{fill:#1f6b47}.tt-prov{fill:#4b2e8a}
      .tt-tool{fill:#922456}.tt-svc{fill:#333f78}.tt-ext{fill:#47535f}
      .tt-core{fill:#0b5b44}.tt-contract{fill:#8a5a12}
      rect.ui{fill:#e8f1fc;stroke:#2f6db3;stroke-width:1.3}
      rect.hand{fill:#e3f3e9;stroke:#3e9266;stroke-width:1.3}
      rect.prov{fill:#ede7f8;stroke:#7c4dd1;stroke-width:1.3}
      rect.tool{fill:#fbe4ee;stroke:#d5478a;stroke-width:1.3}
      rect.svc{fill:#e6eaf6;stroke:#5566b5;stroke-width:1.3}
      rect.ext{fill:#eef1f4;stroke:#8a97a6;stroke-width:1.3;stroke-dasharray:5 4}
      rect.core{fill:#cfe9df;stroke:#0e7a5b;stroke-width:2.4}
      rect.contract{fill:#fcefd2;stroke:#c68a2e;stroke-width:1.3}
      rect.zone-ui{fill:#f3f8fd;stroke:#b8d4ee;stroke-width:1.5}
      rect.zone-main{fill:#f3faf5;stroke:#badfc8;stroke-width:1.5}
      rect.subbox{fill:#ffffff;stroke:#cbd5e0;stroke-width:1;stroke-dasharray:4 3}
      rect.preload{fill:#dde5f0;stroke:#8a9bb5;stroke-width:1.5}
      rect.spine{fill:#fbf3e0;stroke:#c68a2e;stroke-width:1.6}
      .flow{stroke:#5a6a78;stroke-width:1.7;fill:none}
      .cflow{stroke:#c68a2e;stroke-width:1.5;fill:none;stroke-dasharray:5 4}
    </style>
  </defs>

  <rect x="0" y="0" width="1360" height="1050" fill="#f7f9fb"/>

  <text class="t-title" x="30" y="44">Weyouze Anything — Architekturüberblick</text>
  <text class="t-sub" x="31" y="70">Funktionale Module (Main-Prozess) getrennt von der reinen UI (Renderer) — verbunden nur über Preload-Bridge &amp; Shared Contracts</text>

  <g>
    <rect class="ui"   x="740"  y="32" width="13" height="13" rx="2"/><text class="legend" x="758"  y="43">UI</text>
    <rect class="contract" x="795" y="32" width="13" height="13" rx="2"/><text class="legend" x="813" y="43">Contracts</text>
    <rect class="hand" x="895"  y="32" width="13" height="13" rx="2"/><text class="legend" x="913"  y="43">Funktion</text>
    <rect class="svc"  x="1000" y="32" width="13" height="13" rx="2"/><text class="legend" x="1018" y="43">Infra</text>
    <rect class="ext"  x="1075" y="32" width="13" height="13" rx="2"/><text class="legend" x="1093" y="43">Extern</text>
  </g>

