  <text x="570" y="596" text-anchor="middle" font-size="11" fill="#0b5b44">Chat-Orchestrierung &amp; Tool-Loop</text>
  <text class="note" x="398" y="618" fill="#204b3d">• chat-handlers.js — Runden- &amp; Tool-Schleife, System-Prompt</text>
  <text class="note" x="398" y="636" fill="#204b3d">• llm-raw-log.js — RAW-Protokoll je Runde</text>
  <text class="note" x="398" y="654" fill="#204b3d">• chat-history-trim.js — Kontextfenster</text>
  <rect x="398" y="666" width="344" height="64" rx="8" fill="#eaf7f0" stroke="#0e7a5b" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="410" y="686" font-size="10.5" font-weight="700" fill="#0b5b44">Roadmap · Etappe 2</text>
