  <rect class="zone-ui" x="30" y="96" width="1090" height="215" rx="14"/>
  <text class="zlabel tt-ui" x="50" y="122">RENDERER-PROZESS — UI / PRÄSENTATIONSSCHICHT</text>

  <g>
    <rect class="ui" x="50"    y="150" width="196" height="46" rx="8"/>
    <text class="chip tt-ui" x="148" y="170">app.js</text><text class="chipsub" x="148" y="185">Bootstrap · Komposition</text>
    <rect class="ui" x="263.5" y="150" width="196" height="46" rx="8"/>
    <text class="chip tt-ui" x="361.5" y="170">store</text><text class="chipsub" x="361.5" y="185">geteilter UI-State</text>
    <rect class="ui" x="477"   y="150" width="196" height="46" rx="8"/>
    <text class="chip tt-ui" x="575" y="170">ChatStream</text><text class="chipsub" x="575" y="185">Chat-Verlauf &amp; Streaming</text>
    <rect class="ui" x="690.5" y="150" width="196" height="46" rx="8"/>
    <text class="chip tt-ui" x="788.5" y="170">FileTree</text><text class="chipsub" x="788.5" y="185">Datei-Explorer</text>
    <rect class="ui" x="904"   y="150" width="196" height="46" rx="8"/>
    <text class="chip tt-ui" x="1002" y="170">ChatModelPicker</text><text class="chipsub" x="1002" y="185">Modell-/Providerwahl</text>
  </g>
  <g>
    <rect class="ui" x="50"    y="212" width="196" height="46" rx="8"/>
    <text class="chip tt-ui" x="148" y="232">ChatHistoryDrawer</text><text class="chipsub" x="148" y="247">Sitzungsverlauf</text>
    <rect class="ui" x="263.5" y="212" width="196" height="46" rx="8"/>
    <text class="chip tt-ui" x="361.5" y="232">SettingsModal</text><text class="chipsub" x="361.5" y="247">Einstellungen</text>
    <rect class="ui" x="477"   y="212" width="196" height="46" rx="8"/>
    <text class="chip tt-ui" x="575" y="232">RawLogModal</text><text class="chipsub" x="575" y="247">RAW-LLM-Protokoll</text>
    <rect class="ui" x="690.5" y="212" width="196" height="46" rx="8"/>
    <text class="chip tt-ui" x="788.5" y="232">UpdateBanner</text><text class="chipsub" x="788.5" y="247">Update-Hinweis</text>
    <rect class="ui" x="904"   y="212" width="196" height="46" rx="8"/>
    <text class="chip tt-ui" x="1002" y="232">WhisperRecorder</text><text class="chipsub" x="1002" y="247">Spracheingabe</text>
  </g>
  <text class="note" x="50" y="288">Reine Präsentationsschicht: kennt nur <tspan font-style="italic">window.electronAPI</tspan> + Contracts — kein Provider-, Tool- oder Electron-Wissen. Weitere: ThemeManager, SidebarResizer, toolCallSummary, messageUtils.</text>

  <!-- ============ PRELOAD BRIDGE ============ -->
  <rect class="preload" x="30" y="325" width="1090" height="60" rx="10"/>
  <text x="575" y="352" text-anchor="middle" font-size="15" font-weight="700" fill="#1e2b3d">PRELOAD-BRIDGE — contextBridge: window.electronAPI</text>
  <text x="575" y="372" text-anchor="middle" font-size="12" fill="#475569">einzige Brücke UI ⇄ Funktion · invoke (Request/Response) &amp; push (Events) über shared/ipc-channels.js</text>

  <line class="flow" x1="380" y1="311" x2="380" y2="324" marker-end="url(#ah)" marker-start="url(#ah)"/>
  <line class="flow" x1="860" y1="311" x2="860" y2="324" marker-end="url(#ah)" marker-start="url(#ah)"/>

